# ============================================================
# Video-to-fMRI Conditional Flow Matching
# ============================================================

data:
  base_dir: "Data"
  features_dir: "Data/features_npy_pooled"
  fmri_dir: "Data/fmri"
  cache_in_memory: true

  subjects:
    - "sub-01"
    - "sub-02"
    - "sub-03"
    - "sub-05"

  fmri_files:
    friends: "{subject}_task-friends_space-MNI152NLin2009cAsym_atlas-Schaefer18_parcel-1000Par7Net_desc-s123456_bold.h5"
    movie10: "{subject}_task-movie10_space-MNI152NLin2009cAsym_atlas-Schaefer18_parcel-1000Par7Net_bold.h5"

  fmri_dim: 1000  # Schaefer 1000 parcels

  # Train = movie10 (all) + friends s1-s5, Val = friends s6
  train_seasons: ["s01", "s02", "s03", "s04", "s05"]
  val_seasons: ["s06"]
  train_include_movie10: true

  window_size: 31     # 30 past + current frame
  fmri_run_strategy: "average"
  normalize_fmri: true

  # HRF alignment (matching challenge baseline)
  excluded_samples_start: 5   # skip first 5 TRs per run (no stimulus info yet)
  excluded_samples_end: 5     # skip last 5 TRs per run (fMRI may outlast stimulus)
  hrf_delay: 3                # ~4.5s hemodynamic delay (3 TRs × 1.49s)

# ============================================================
# Fusion Encoder (Temporal-Preserving, TRIBEv2-inspired)
# ============================================================
fusion_encoder:
  d_model: 1024
  num_encoder_layers: 2   # lightweight temporal Transformer
  num_heads: 4
  dropout: 0.1
  modality_dropout: 0.1   # per-modality dropout (training only)
  temporal_dropout: 0.1   # per-frame dropout (training only)

# ============================================================
# DiT Velocity Network (AdaLN + Cross-Attention)
# ============================================================
dit:
  patch_size: 20       # 1000 parcels → 50 patches
  hidden_size: 1024
  depth: 8
  num_heads: 16        # 1024/16 = 64 per head
  context_dim: 1024     # must match fusion_encoder.d_model
  dropout: 0.1

# ============================================================
# Modalities
# ============================================================
modalities:
  vjepa2_avg_feat:
    layer_key: "encoder.layernorm_avg"
    dim: 1408
    needs_squeeze: true

  whisper:
    layer_key: "layer_norm"
    dim: 1280
    needs_squeeze: true

  InternVL3_14B:
    layer_key: "language_model.model.norm"
    dim: 5120
    needs_squeeze: false

  internvl3_8b_8bit:
    layer_key: "language_model.model.norm"
    dim: 3584
    needs_squeeze: false

  Llama-3.2-1B:
    layer_key: "model.layers.15"
    dim: 2048
    needs_squeeze: false
    movie10_prefix: "movie10_"

  Llama-3.2-3B:
    layer_key: "model.layers.23"
    dim: 3072
    needs_squeeze: false
    movie10_prefix: "movie10_"

  qwen-2-5-omni-7b:
    layer_key: "model.norm"
    dim: 3584
    needs_squeeze: false

  qwen2-5_3B:
    layer_key: "model.norm"
    dim: 2048
    needs_squeeze: false

  ast:
    layer_key: "layernorm"
    dim: 768
    needs_squeeze: false

  dinov2_giant:
    layer_key: "norm"
    dim: 1536
    needs_squeeze: false
    needs_avg_pool: true

  vlm2vec_7b:
    layer_key: "model.norm"
    dim: 3584
    needs_squeeze: false

# Total: 1408+1280+5120+3584+2048+3072+3584+2048+768+1536+3584 = 28032

# ============================================================
# Training
# ============================================================
training:
  batch_size: 256
  num_workers: 4
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 300
  seed: 42
  save_dir: "checkpoints"
  log_freq: 50
  val_every: 5
  ode_steps: 50        # Euler steps for inference
